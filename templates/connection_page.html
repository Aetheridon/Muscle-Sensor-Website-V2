<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="..\static\connection.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect</title>
</head>
<body>
    <div class="form-container">
        <h1>Connect to Sensors</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="#" method="post">
            <p>IP:</p>
            <p><input type="text" name="ip" minlength="7" maxlength="15" size="15" pattern="^((25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])$" required /></p>
            <p>Port:</p>
            <p><input type="number" name="port" min="1" max="65535" required /></p>
            <p><input type="submit" value="submit" /></p>
        </form>
    </div>
</body>
</html>
